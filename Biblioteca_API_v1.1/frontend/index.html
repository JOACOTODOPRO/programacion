<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca Digital v1.1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <h1>📚 Biblioteca Digital <span class="version">v1.1</span></h1>
    <p>Gestión de libros conectada a MongoDB</p>
  </header>

  <main class="contenedor">

    <!-- Mensajes de éxito / error -->
    <div id="alerta" class="alerta oculto"></div>

    <!-- Formulario de creación / edición -->
    <section class="tarjeta">
      <h2 id="formTitulo">Agregar nuevo libro</h2>
      <form id="formLibro">
        <input type="hidden" id="libroId" />

        <div class="grupo">
          <label for="titulo">Título *</label>
          <input type="text" id="titulo" name="titulo" required maxlength="200" placeholder="Ej: Cien años de soledad" />
        </div>

        <div class="grupo">
          <label for="autor">Autor *</label>
          <input type="text" id="autor" name="autor" required maxlength="150" placeholder="Ej: Gabriel García Márquez" />
        </div>

        <div class="fila">
          <div class="grupo">
            <label for="anio">Año de publicación *</label>
            <input type="number" id="anio" name="anio" required min="0" placeholder="Ej: 1967" />
          </div>

          <div class="grupo">
            <label for="genero">Género (opcional)</label>
            <input type="text" id="genero" name="genero" maxlength="60" placeholder="Ej: Realismo mágico" />
          </div>
        </div>

        <div class="grupo">
          <label for="estado">Estado</label>
          <select id="estado" name="estado">
            <option value="disponible">Disponible</option>
            <option value="prestado">Prestado</option>
          </select>
        </div>

        <div class="botones-form">
          <button type="submit" id="btnGuardar" class="btn btn-primario">Guardar libro</button>
          <button type="button" id="btnCancelar" class="btn btn-secundario oculto">Cancelar edición</button>
        </div>
      </form>
    </section>

    <!-- Listado de libros -->
    <section class="tarjeta">
      <div class="tarjeta-header">
        <h2>Libros registrados</h2>
        <button id="btnRefrescar" class="btn btn-secundario">🔄 Actualizar</button>
      </div>

      <div class="tabla-wrapper">
        <table id="tablaLibros">
          <thead>
            <tr>
              <th>ID</th>
              <th>Título</th>
              <th>Autor</th>
              <th>Año</th>
              <th>Género</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="cuerpoTabla">
            <!-- Filas generadas dinámicamente con JS -->
          </tbody>
        </table>
        <p id="sinLibros" class="sin-datos oculto">No hay libros cargados todavía.</p>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>Proyecto académico &middot; Biblioteca Digital API v1.1 &middot; Node.js + Express + MongoDB</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
